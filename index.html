<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostPop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/icon32.png">
</head>
<body>

  <header>
    <img src="assets/icon128.png" alt="GhostPop logo">
    <span>GhostPop</span>
  </header>

  <section id="hero">
    <h1>GHOSTPOP</h1>
    <p>Keep your Depop listings at the top. Automatically.</p>
    <a href="#" class="btn">Add to Chrome</a>
  </section>

  <section id="how-it-works">
    <h2>How it works</h2>
    <div class="steps">
      <div class="step">
        <span>01</span>
        <p>Install the extension</p>
      </div>
      <div class="step">
        <span>02</span>
        <p>Log into your Depop account</p>
      </div>
      <div class="step">
        <span>03</span>
        <p>Hit renew — your listings move to the top</p>
      </div>
    </div>
  </section>

  <footer>
    <p>Made by <a href="https://github.com/mclyles12">mclyles12</a></p>
  </footer>

</body>
</html>
